name: Package Module

on:
  push:
    branches: [main, master]
    paths:
      - "module/**"
      - "tooling/scripts/build-web.mjs"
      - "tooling/scripts/package-module.mjs"
  pull_request:
    branches: [main, master]
    paths:
      - "module/**"
      - "tooling/scripts/build-web.mjs"
      - "tooling/scripts/package-module.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-module:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build:module

      - uses: actions/upload-artifact@v4
        with:
          name: magisk-module
          path: release/*.zip
          if-no-files-found: error
